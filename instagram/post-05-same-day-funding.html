<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CIF · Same-day funding</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="standalone">
<div class="post bg-green-gradient">

  <div class="grid-dots" style="background-image: radial-gradient(rgba(255,255,255,.18) 1.5px, transparent 1.5px);"></div>
  <div class="blob blob-yellow" style="width: 540px; height: 540px; top: -180px; right: -180px;"></div>
  <div class="ring" style="width: 700px; height: 700px; bottom: -280px; left: -200px; border-color: rgba(255,255,255,.12);"></div>

  <div class="content">
    <div class="brand-mark on-dark on-green">Cash in <span class="flash"><span>Flash</span></span></div>

    <div style="margin-top: 80px;">
      <div class="icon-tile yellow" style="width:120px; height:120px; border-radius:32px;">
        <svg class="lucide" viewBox="0 0 24 24" width="64" height="64"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <h1 class="h-hero" style="color:#fff; margin-top: 40px;">
        Funded the<br />
        <span class="gradient-text-yellow">same day</span>.
      </h1>
      <p class="lede" style="color: rgba(255,255,255,.92); max-width: 800px;">
        Apply by the afternoon and you could see funds in your account before
        the day's done. Speed is kind of our thing.
      </p>
    </div>

    <div class="glass" style="margin-top: 48px; display: flex; align-items: center; gap: 32px;">
      <div style="font-size: 96px; font-weight: 800; line-height: 1;" class="gradient-text-yellow">⚡</div>
      <div>
        <div style="font-size: 38px; font-weight: 700;">Most loans funded same-day</div>
        <div style="font-size: 22px; opacity: .85; margin-top: 6px;">In-store cash · Direct deposit · Instant decisions</div>
      </div>
    </div>

    <div class="footer-row" style="color:#fff;">
      <span class="footer-url">cashinflash.com</span>
      <span class="handle">@cashinflash</span>
    </div>
  </div>
</div>
</body>
</html>
