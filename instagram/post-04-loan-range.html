<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CIF · Loan range</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="standalone">
<div class="post bg-mint">

  <div class="blob blob-green" style="width: 620px; height: 620px; top: -200px; right: -180px; opacity:.4;"></div>
  <div class="blob blob-yellow" style="width: 360px; height: 360px; bottom: -100px; left: -100px; opacity:.55;"></div>
  <div class="grid-dots on-light"></div>

  <div class="content">
    <div class="brand-mark on-light">Cash in <span class="flash"><span>Flash</span></span></div>

    <div style="margin-top: 88px; text-align: center;">
      <span class="eyebrow">California payday loans</span>
      <div style="font-size: 168px; font-weight: 800; line-height: 1; letter-spacing: -6px; margin-top: 40px; white-space: nowrap;" class="gradient-text">
        $100<span style="font-size: 120px; vertical-align: 22px; padding: 0 12px; font-weight: 700;">–</span>$255
      </div>
      <p class="lede" style="margin: 44px auto 0; text-align: center;">
        Borrow what you actually need — no upselling, no surprises.
      </p>
      <div style="margin-top: 52px;">
        <span class="pill pill-yellow">
          Apply now
          <svg class="lucide" viewBox="0 0 24 24" width="28" height="28"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </span>
      </div>
    </div>

    <div class="footer-row" style="color:#1a1a2e;">
      <span style="font-size:22px; font-weight:500; opacity:.7;">Same-day funding · No perfect credit needed</span>
      <span class="footer-url">cashinflash.com</span>
    </div>
  </div>
</div>
</body>
</html>
