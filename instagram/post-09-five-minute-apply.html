<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CIF · 5 minutes</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="standalone">
<div class="post bg-navy">

  <div class="grid-dots"></div>
  <div class="blob blob-green" style="width: 720px; height: 720px; bottom: -260px; right: -240px;"></div>
  <div class="blob blob-yellow" style="width: 380px; height: 380px; top: -120px; left: -100px; opacity: .4;"></div>

  <div class="content">
    <div class="brand-mark on-dark">Cash in <span class="flash"><span>Flash</span></span></div>

    <div style="margin-top: 80px;">
      <span class="eyebrow on-dark">⏱ Apply now</span>
      <div style="font-size: 380px; font-weight: 800; line-height: .9; letter-spacing: -14px; margin-top: 24px;" class="gradient-text">
        5<span style="font-size: 200px; vertical-align: 60px; padding-left: 12px; letter-spacing: -4px;">min</span>
      </div>
      <h2 class="h-mid" style="color:#fff; margin-top: 12px;">
        That's all it takes to apply.
      </h2>
      <p class="lede" style="color: rgba(255,255,255,.85);">
        Phone in one hand, coffee in the other. Submit, get a decision,
        get on with your day.
      </p>
    </div>

    <div style="display:flex; gap:14px; margin-top: 32px;">
      <span class="pill-sm pill" style="background: rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.18);">① Fill the form</span>
      <span class="pill-sm pill" style="background: rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.18);">② Get decision</span>
      <span class="pill-sm pill" style="background: rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.18);">③ Get funded</span>
    </div>

    <div class="footer-row" style="color:#fff;">
      <span class="footer-url">cashinflash.com</span>
      <span class="handle">@cashinflash</span>
    </div>
  </div>
</div>
</body>
</html>
