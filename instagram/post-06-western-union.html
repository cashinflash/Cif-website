<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CIF · Western Union</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="standalone">
<div class="post bg-mint">

  <div class="blob blob-yellow" style="width: 560px; height: 560px; top: -180px; right: -180px;"></div>
  <div class="blob blob-mint" style="width: 600px; height: 600px; bottom: -220px; left: -180px;"></div>
  <div class="grid-dots on-light"></div>

  <div class="content">
    <div class="brand-mark on-light">Cash in <span class="flash"><span>Flash</span></span></div>

    <div style="margin-top: 72px;">
      <span class="eyebrow">★ Western Union ★</span>
      <h1 class="h-section">
        Send money. Receive money.<br />
        <span class="gradient-text">Worldwide.</span>
      </h1>
      <p class="lede" style="margin-top: 20px;">
        Wire money home, pick up a transfer, or pay a bill — at any local
        Cash in Flash store, in person, in minutes.
      </p>
    </div>

    <div style="display:flex; gap:22px; margin-top:40px;">
      <div class="card" style="flex:1; text-align:center; padding: 28px 24px;">
        <div class="icon-tile yellow" style="margin: 0 auto; width:72px; height:72px; border-radius:20px;">
          <svg class="lucide" viewBox="0 0 24 24" style="width:36px; height:36px;"><path d="M3 11l18-8-7 18-2-7-9-3z"/></svg>
        </div>
        <div style="font-size: 24px; font-weight: 700; margin-top: 14px;">Send money</div>
        <div style="font-size: 17px; opacity: .7; margin-top: 4px;">200+ countries</div>
      </div>
      <div class="card" style="flex:1; text-align:center; padding: 28px 24px;">
        <div class="icon-tile yellow" style="margin: 0 auto; width:72px; height:72px; border-radius:20px;">
          <svg class="lucide" viewBox="0 0 24 24" style="width:36px; height:36px;"><path d="M21 13l-18 8 7-18 2 7 9 3z"/></svg>
        </div>
        <div style="font-size: 24px; font-weight: 700; margin-top: 14px;">Receive money</div>
        <div style="font-size: 17px; opacity: .7; margin-top: 4px;">Cash in hand</div>
      </div>
      <div class="card" style="flex:1; text-align:center; padding: 28px 24px;">
        <div class="icon-tile yellow" style="margin: 0 auto; width:72px; height:72px; border-radius:20px;">
          <svg class="lucide" viewBox="0 0 24 24" style="width:36px; height:36px;"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 010 20M12 2a15 15 0 000 20"/></svg>
        </div>
        <div style="font-size: 24px; font-weight: 700; margin-top: 14px;">Pay a bill</div>
        <div style="font-size: 17px; opacity: .7; margin-top: 4px;">Major billers</div>
      </div>
    </div>

    <div class="footer-row" style="color:#1a1a2e;">
      <span class="pill-sm pill" style="background:#1a1a2e;">
        Find a store
        <svg class="lucide" viewBox="0 0 24 24" width="20" height="20"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </span>
      <span class="footer-url">cashinflash.com</span>
    </div>
  </div>
</div>
</body>
</html>
