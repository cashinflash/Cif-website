<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CIF · Apply now</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="standalone">
<div class="post bg-green-gradient">

  <div class="grid-dots" style="background-image: radial-gradient(rgba(255,255,255,.16) 1.5px, transparent 1.5px);"></div>
  <div class="blob blob-yellow" style="width: 480px; height: 480px; top: -160px; right: -140px;"></div>
  <div class="blob blob-green" style="width: 700px; height: 700px; bottom: -260px; left: -220px; background: rgba(0,0,0,.25);"></div>
  <div class="ring" style="width: 760px; height: 760px; bottom: -300px; right: -260px; border-color: rgba(255,255,255,.14);"></div>

  <div class="content">
    <div class="brand-mark on-dark on-green">Cash in <span class="flash"><span>Flash</span></span></div>

    <div style="margin-top: 80px;">
      <span class="eyebrow on-dark">→ Ready when you are</span>
      <h1 class="h-display" style="color:#fff;">
        Apply<br />
        in <span class="gradient-text-yellow">5 minutes</span>.
      </h1>
      <p class="lede" style="color: rgba(255,255,255,.92);">
        Start moving forward today. Same-day funding · No perfect credit needed.
      </p>
    </div>

    <div class="glass" style="margin-top: 44px; padding: 40px 48px; display: flex; align-items: center; justify-content: space-between; gap: 28px;">
      <div>
        <div style="font-size: 22px; opacity: .85; letter-spacing: 1px; text-transform: uppercase;">Visit</div>
        <div style="font-size: 56px; font-weight: 800; margin-top: 4px;">cashinflash.com</div>
      </div>
      <span class="pill pill-yellow" style="font-size: 32px; padding: 26px 44px;">
        Apply now
        <svg class="lucide" viewBox="0 0 24 24" width="32" height="32"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </span>
    </div>

    <div class="footer-row" style="color:#fff;">
      <span style="font-size:22px; opacity:.85;">California payday loans · Cash advances · Western Union</span>
      <span class="handle">@cashinflash</span>
    </div>
  </div>
</div>
</body>
</html>
