<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CIF · Welcome</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="standalone">
<div class="post bg-mint">

  <!-- decorative blobs -->
  <div class="blob blob-green" style="width: 520px; height: 520px; top: -180px; right: -160px; opacity: .35;"></div>
  <div class="blob blob-mint" style="width: 720px; height: 720px; bottom: -260px; left: -240px; opacity: .9;"></div>
  <div class="ring ring-green" style="width: 600px; height: 600px; top: 120px; right: -200px;"></div>
  <div class="grid-dots on-light"></div>

  <div class="content">
    <div class="brand-mark on-light">Cash in <span class="flash"><span>Flash</span></span></div>

    <div style="margin-top: 96px;">
      <span class="eyebrow">★ Welcome ★</span>
      <h1 class="h-hero">
        Fast cash when<br />
        you <span class="underline-squiggle gradient-text">need it</span>.
      </h1>
      <p class="lede">
        California payday loans, cash advances, and Western Union — fast, fair,
        and stress-free. We're glad you're here.
      </p>
    </div>

    <div class="footer-row" style="color:#1a1a2e;">
      <span class="pill">
        Apply in 5 minutes
        <svg class="lucide" viewBox="0 0 24 24" width="28" height="28"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </span>
      <span class="footer-url">cashinflash.com</span>
    </div>
  </div>
</div>
</body>
</html>
