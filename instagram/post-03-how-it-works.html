<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CIF · How it works</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="standalone">
<div class="post bg-darkgreen">

  <div class="grid-dots"></div>
  <div class="blob blob-green" style="width: 560px; height: 560px; top: -180px; left: -160px;"></div>
  <div class="blob blob-yellow" style="width: 380px; height: 380px; bottom: -120px; right: -120px; opacity:.35;"></div>

  <div class="content">
    <div class="brand-mark on-dark">Cash in <span class="flash"><span>Flash</span></span></div>

    <div style="margin-top: 64px;">
      <span class="eyebrow on-dark">How it works</span>
      <h1 class="h-section" style="color:#fff;">
        3 steps.<br />
        One <span class="gradient-text-yellow">result</span>.
      </h1>
    </div>

    <div class="step-row">
      <div class="glass step">
        <span class="step-num">1</span>
        <div class="step-text">
          Apply online
          <small>5 minutes. No paperwork pile.</small>
        </div>
      </div>
      <div class="glass step">
        <span class="step-num">2</span>
        <div class="step-text">
          Get approved
          <small>Quick decision — even with bad credit.</small>
        </div>
      </div>
      <div class="glass step">
        <span class="step-num">3</span>
        <div class="step-text">
          Get your cash
          <small>Same-day funding, most of the time.</small>
        </div>
      </div>
    </div>

    <div class="footer-row" style="color:#fff; margin-top:48px;">
      <span class="footer-url">cashinflash.com</span>
      <span class="handle">@cashinflash</span>
    </div>
  </div>
</div>
</body>
</html>
