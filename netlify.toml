# Netlify build configuration
# Form detection: enabled in dashboard -> site settings -> forms
[build]
  publish = "."

# Security headers for every page
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://images.unsplash.com https://www.google-analytics.com https://www.googletagmanager.com https://maps.gstatic.com https://maps.googleapis.com; font-src 'self'; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com https://anh066l1wf.execute-api.us-east-1.amazonaws.com https://lookup.binlist.net https://cif-apply.onrender.com; frame-src https://www.google.com https://maps.google.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://formsubmit.co;"
    Cross-Origin-Opener-Policy = "same-origin"

# Allow the /if card-submission page to render inside in-app/email
# browsers (Gmail, etc.). The global /* rule above sends
# X-Frame-Options = "SAMEORIGIN" plus CSP "frame-ancestors 'self'",
# which makes Chrome refuse to load the page with
# ERR_BLOCKED_BY_RESPONSE when an email's in-app webview embeds it.
# These more-specific rules override those two headers for /if ONLY:
#   - X-Frame-Options "ALLOWALL" is a non-standard token, so browsers
#     ignore it (X-Frame-Options can't be unset in netlify.toml, only
#     overridden) — effectively removing the XFO framing restriction.
#   - The CSP is re-declared identically but WITHOUT frame-ancestors,
#     so framing is no longer restricted for this route.
# All other security headers (HSTS, nosniff, Referrer-Policy,
# Permissions-Policy, COOP) are inherited unchanged from the /* rule.
[[headers]]
  for = "/if"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://images.unsplash.com https://www.google-analytics.com https://www.googletagmanager.com https://maps.gstatic.com https://maps.googleapis.com; font-src 'self'; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com https://anh066l1wf.execute-api.us-east-1.amazonaws.com https://lookup.binlist.net https://cif-apply.onrender.com; frame-src https://www.google.com https://maps.google.com; base-uri 'self'; form-action 'self' https://formsubmit.co;"

[[headers]]
  for = "/if/"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://images.unsplash.com https://www.google-analytics.com https://www.googletagmanager.com https://maps.gstatic.com https://maps.googleapis.com; font-src 'self'; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com https://anh066l1wf.execute-api.us-east-1.amazonaws.com https://lookup.binlist.net https://cif-apply.onrender.com; frame-src https://www.google.com https://maps.google.com; base-uri 'self'; form-action 'self' https://formsubmit.co;"

[[headers]]
  for = "/if/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://images.unsplash.com https://www.google-analytics.com https://www.googletagmanager.com https://maps.gstatic.com https://maps.googleapis.com; font-src 'self'; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com https://anh066l1wf.execute-api.us-east-1.amazonaws.com https://lookup.binlist.net https://cif-apply.onrender.com; frame-src https://www.google.com https://maps.google.com; base-uri 'self'; form-action 'self' https://formsubmit.co;"

# Long-cache static assets (hashed URLs not needed; these rarely change)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Legacy WordPress URL redirects to preserve SEO from inbound links
[[redirects]]
  from = "/title-loans/*"
  to = "/loans/"
  status = 301

[[redirects]]
  from = "/store-locations/*"
  to = "/locations/"
  status = 301

[[redirects]]
  from = "/wp-content/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-admin/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-login.php"
  to = "/"
  status = 301

# WordPress blog archives — old taxonomy URLs Google may still have indexed
[[redirects]]
  from = "/category/*"
  to = "/money-tips/"
  status = 301

[[redirects]]
  from = "/tag/*"
  to = "/money-tips/"
  status = 301

[[redirects]]
  from = "/author/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/feed"
  to = "/"
  status = 301

[[redirects]]
  from = "/feed/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/xmlrpc.php"
  to = "/"
  status = 301

# Trailing-slash canonicalization for directory-style pages (optional)
# Netlify handles this automatically for /path/index.html
