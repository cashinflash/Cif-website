<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#1a2e4a"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#ringGrad)" stroke-width="10"/>

  <!-- Inner light blue accent ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#d4e8f5" stroke-width="5"/>

  <!-- White center -->
  <circle cx="100" cy="100" r="78" fill="#ffffff"/>

  <!-- Left ribbon -->
  <polygon points="18,95 8,88 8,102 18,108" fill="#1B3A5C"/>
  <polygon points="18,95 28,88 28,102 18,108" fill="#1a2e4a"/>

  <!-- Right ribbon -->
  <polygon points="182,95 192,88 192,102 182,108" fill="#1B3A5C"/>
  <polygon points="182,95 172,88 172,102 182,108" fill="#1a2e4a"/>

  <!-- STATE LICENSED banner -->
  <rect x="40" y="28" width="120" height="26" rx="2" fill="#1B3A5C"/>
  <text x="100" y="46" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="13" fill="#ffffff" letter-spacing="1.5">STATE LICENSED</text>

  <!-- DIRECT LENDER text -->
  <text x="100" y="90" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="26" fill="#1B3A5C" letter-spacing="0.5">DIRECT</text>
  <text x="100" y="118" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="26" fill="#1B3A5C" letter-spacing="0.5">LENDER</text>

  <!-- Green shield -->
  <path d="M85,130 L100,128 L115,130 L115,152 C115,158 108,164 100,168 C92,164 85,158 85,152 Z" fill="url(#shieldGrad)"/>

  <!-- F lightning bolt on shield -->
  <path d="M95,137 L103,137 L101,144 L107,144 L96,160 L99,150 L93,150 Z" fill="#ffffff"/>
</svg>
