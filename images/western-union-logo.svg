<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150">
  <!-- Western Union Logo - Yellow W Mark + Text -->

  <!-- W Mark - Two overlapping yellow shapes -->
  <g transform="translate(0,5)">
    <!-- Left V shape -->
    <path d="M0 0 L32 0 L72 112 L90 56 L72 0 L104 0 L72 140 Z" fill="#FFDD00"/>
    <!-- Right V shape -->
    <path d="M52 0 L84 0 L124 112 L142 56 L124 0 L156 0 L124 140 Z" fill="#FFDD00"/>
  </g>

  <!-- "Western" text -->
  <text x="185" y="62" font-family="Arial Black,Helvetica,sans-serif" font-size="62" font-weight="900" fill="#000" letter-spacing="-2">Western</text>
  <!-- "Union" text -->
  <text x="185" y="130" font-family="Arial Black,Helvetica,sans-serif" font-size="62" font-weight="900" fill="#000" letter-spacing="-2">Union</text>
</svg>
