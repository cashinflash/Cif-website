<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 140">
  <!-- Western Union Logo -->

  <!-- W Mark - Two overlapping chevron/V shapes -->
  <g transform="translate(0, 0)">
    <!-- Back-left V chevron (slightly behind) -->
    <path d="M8 4 L38 4 L68 108 L98 4 L118 4 L76 136 L60 136 Z" fill="#FFDD00"/>
    <!-- Front-right V chevron (overlapping) -->
    <path d="M58 4 L88 4 L118 108 L148 4 L168 4 L126 136 L110 136 Z" fill="#FFDD00"/>
    <!-- White cut between the two Vs to create separation -->
    <path d="M68 108 L82 68 L76 136 L60 136 Z" fill="#fff"/>
  </g>

  <!-- "Western" text -->
  <text x="185" y="58" font-family="'Arial Black','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="58" font-weight="900" fill="#000" letter-spacing="-1.5">Western</text>
  <!-- "Union" text -->
  <text x="185" y="122" font-family="'Arial Black','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="58" font-weight="900" fill="#000" letter-spacing="-1.5">Union</text>
</svg>
