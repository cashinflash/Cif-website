<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130">
  <!-- Western Union Logo -->

  <!-- W Mark composed of two overlapping V-chevrons -->
  <!-- Right V chevron (drawn first, sits behind) -->
  <polygon points="50,2 80,2 120,126 160,2 178,2 130,130 110,130" fill="#FFCC00"/>
  <!-- Left V chevron (drawn second, sits in front with white edge) -->
  <polygon points="0,2 18,2 70,130 90,130 130,2 100,2 70,90" fill="#FFCC00"/>
  <!-- White diagonal separator creating depth between the two Vs -->
  <polygon points="70,90 80,62 90,130 70,130" fill="#fff"/>

  <!-- Text -->
  <text x="175" y="52" font-family="'Arial Black','Segoe UI Black','Helvetica Neue',sans-serif" font-size="53" font-weight="900" fill="#1a1a1a" letter-spacing="-1">Western</text>
  <text x="175" y="115" font-family="'Arial Black','Segoe UI Black','Helvetica Neue',sans-serif" font-size="53" font-weight="900" fill="#1a1a1a" letter-spacing="-1">Union</text>
</svg>
